<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>📺 MONITER</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <!-- Style Sheets -->
    <link rel="stylesheet" href="../login/login.css" />
    <link rel="stylesheet" href="dashboard.css" />
  </head>
  <body>
    <!-- พื้นหลังที่เป็นทรงกลมเบลอเคลื่อนไหว -->
    <div class="blob blob-1"></div>
    <div class="blob blob-2"></div>

    <!-- ปุ่ม Logout มุมขวาบน -->
    <button class="btn-logout" id="btn-logout">ออกจากระบบ</button>

    <div class="dashboard-container">
      <div class="data-header">
        <h2 id="data-title">📺 MONITER</h2>
      </div>

      <div class="stats-grid">
        <!-- Card 1: ใบงาน iMind -->
        <div class="card premium-card">
          <div class="card-icon">
            <svg
              width="48"
              height="48"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
              stroke-linecap="round"
              stroke-linejoin="round"
            >
              <path
                d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"
              ></path>
              <polyline points="14 2 14 8 20 8"></polyline>
              <line x1="16" y1="13" x2="8" y2="13"></line>
              <line x1="16" y1="17" x2="8" y2="17"></line>
              <polyline points="10 9 9 9 8 9"></polyline>
            </svg>
          </div>
          <div class="card-content">
            <h3 class="card-label">i-Mind</h3>
            <div class="card-value" id="ticket-count">0</div>
            <p class="card-subtitle" id="ticket-open"></p>
          </div>
        </div>

        <!-- Card 2: Google Sheet IT -->
        <div class="card premium-card card-green">
          <div class="card-icon icon-green">
            <svg
              width="48"
              height="48"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
              stroke-linecap="round"
              stroke-linejoin="round"
            >
              <rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect>
              <line x1="3" y1="9" x2="21" y2="9"></line>
              <line x1="3" y1="15" x2="21" y2="15"></line>
              <line x1="9" y1="3" x2="9" y2="21"></line>
              <line x1="15" y1="3" x2="15" y2="21"></line>
            </svg>
          </div>
          <div class="card-content">
            <h3 class="card-label">Google Sheet (IT)</h3>
            <div class="card-value" id="gsheet-diff">
              <span class="loading-spinner"></span>
            </div>
            <div class="card-sub-stats">
              <span class="sub-stat"
                >Total (SPF) : <strong id="gsheet-val-f">0</strong></span
              >
              <span class="sub-stat"
                >Done (IT) : <strong id="gsheet-val-h">0</strong></span
              >
            </div>
          </div>
        </div>
      </div>
    </div>

    <script src="dashboard.js"></script>
    <script src="visibility_tracker.js"></script>
  </body>
</html>
